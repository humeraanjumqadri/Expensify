<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expensify-Expence Tracker</title>
    <link rel="stylesheet" href="Expensify.css">
</head>
<body>
<header>
    <h2>Expensify - Expense Tracker</h2>
    <button id="theme-toggle">🌙</button>
</header>

<div class="container">
    <h4>Your Balance</h4>
    <h1 id="balance">$0.00</h1>
    <h4>Total Transactions: <span id="count">0</span></h4>
    <canvas id="chart"></canvas>
    <div class="inc-exp-container">
        <div>
            <h4>Income</h4>
            <p id="money-plus" class="money-plus">+$0.00</p>
        </div>
        <div>
            <h4>Expense</h4>
            <p id="money-minus" class="money-minus">-$0.00</p>
        </div>
    </div>
    <input type="text" id="search" placeholder="Search transactions...">
    <h3>History</h3>
    <ul id="list" class="list">
    <!-- List of previous incomes and expenses -->
    </ul>

    <h3>Add new transaction</h3>

    <form id="form">
        <div class="form-control">
            <label for="text">Name</label>
            <input type="text" id="text" placeholder="Enter name of transaction">
        </div>
        <select id="category">
  <option>Food</option>
  <option>Travel</option>
  <option>Shopping</option>
</select>

           <div class="form-control">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="Enter amount...">
        </div>
        <button class="btn" type="submit">Add transaction</button>
        
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="Expensify.js"></script>
</body>
</html>
